<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neuro-Synthetix. Data & metrics.</title>
<link rel="icon" type="image/png" href="/static/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Open+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
  :root{
    --ink:#14181C;--ink-soft:#404A53;--muted:#6B7680;
    --paper:#FAF7F2;--paper-2:#F3EEE6;--card:#FFFFFF;--line:#E6DFD4;--line-2:#DED6C8;
    --teal:#0E7C66;--teal-d:#0A5C4C;--teal-wash:#E8F3EF;--coral:#E4573B;--amber:#C77D2E;--violet:#6D4AA6;
    --shadow:0 30px 70px -40px rgba(20,24,28,.4);--shadow-s:0 12px 30px -18px rgba(20,24,28,.3);
  }
  *{box-sizing:border-box}
  html{-webkit-font-smoothing:antialiased}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Open Sans',system-ui,sans-serif;line-height:1.6}
  h1,h2,h3{font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:700;letter-spacing:-.035em}
  a{color:var(--teal-d);text-decoration:none}
  :focus-visible{outline:3px solid var(--teal);outline-offset:3px;border-radius:8px}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px}
  .eyebrow{font-family:'Space Mono';font-size:.74rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--teal-d)}

  header.nav{position:sticky;top:0;z-index:1000;background:rgba(250,247,242,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .nav .wrap{display:flex;align-items:center;justify-content:space-between;padding:14px 24px}
  .brand{display:flex;align-items:center;gap:11px;font-family:'IBM Plex Mono';font-weight:700;font-size:1.08rem;letter-spacing:-.03em}
  .brand .g{width:32px;height:32px}
  .nav a.cta{background:var(--ink);color:#fff;padding:10px 18px;border-radius:100px;font-family:'IBM Plex Mono';font-weight:700;font-size:.88rem;letter-spacing:-.02em}
  .nav a.cta:hover{background:var(--teal-d);color:#fff}

  .maphead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:26px 0 12px}
  .maphead h1{font-size:clamp(1.5rem,3.4vw,2.1rem);margin:0}
  .maphead .n{font-family:'Space Mono';color:var(--muted);font-size:.9rem}
  #map{height:520px;width:100%;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);z-index:1}
  @media(max-width:640px){#map{height:400px}}
  .leaflet-popup-content{font-family:'Open Sans';font-size:.88rem}
  .leaflet-popup-content b{font-family:'Space Mono';font-size:.78rem}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:26px 0}
  @media(max-width:760px){.stats{grid-template-columns:1fr 1fr}}
  .stat{background:var(--ink);color:#fff;border-radius:18px;padding:22px}
  .stat b{font-family:'IBM Plex Mono';font-size:2.2rem;font-weight:700;display:block;letter-spacing:-.04em;line-height:1}
  .stat span{color:#AEBAC2;font-size:.86rem;display:block;margin-top:8px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:60px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px}
  .card h2{font-family:'Space Mono';font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:0 0 16px;font-weight:700}
  .row{margin-bottom:12px}
  .row .lab{display:flex;justify-content:space-between;font-size:.9rem;margin-bottom:5px}
  .row .lab b{font-family:'Space Mono';color:var(--ink-soft);font-weight:700;font-size:.82rem}
  .row .track{height:8px;background:var(--paper-2);border-radius:100px;overflow:hidden}
  .row .f{height:100%;border-radius:100px;width:0;transition:width .8s ease}
  .srcrow .name{display:flex;align-items:center;gap:8px}
  .srcrow .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
</style>
</head>
<body>
<header class="nav">
  <div class="wrap">
    <a class="brand" href="/">
      <img src="/static/logo.png" alt="Neuro-Synthetix" style="height:36px;width:auto;display:block" />
    </a>
    <a href="/app" class="cta">Open assistant</a>
  </div>
</header>

<main class="wrap">
  <div class="maphead">
    <h1>Research sites in the database</h1>
    <span class="n" id="mapcount">loading map…</span>
  </div>
  <div id="map"></div>

  <div class="stats">
    <div class="stat"><b id="s-total">&mdash;</b><span>clinical trials</span></div>
    <div class="stat"><b id="s-sites">&mdash;</b><span>located research sites</span></div>
    <div class="stat"><b id="s-sources">&mdash;</b><span>registries</span></div>
    <div class="stat"><b id="s-countries">&mdash;</b><span>countries</span></div>
  </div>

  <div class="grid">
    <div class="card"><h2>Trials by source</h2><div id="c-sources"></div></div>
    <div class="card"><h2>Top countries</h2><div id="c-countries"></div></div>
    <div class="card"><h2>Top conditions</h2><div id="c-conditions"></div></div>
    <div class="card"><h2>Refresh</h2>
      <div class="row"><div class="lab"><span>Auto refresh</span><b>every 12h</b></div></div>
      <div class="row"><div class="lab"><span>Sources</span><b id="srclist">—</b></div></div>
      <div class="row"><div class="lab"><span>References</span><b>NCT / CTIS / ISRCTN</b></div></div>
    </div>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
const $=s=>document.querySelector(s);
const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const SRC_COLOR={"ClinicalTrials.gov":"#0E7C66","ClinicalTrials.gov (India)":"#C77D2E","CTIS-EU":"#6D4AA6","ISRCTN":"#E4573B"};

// map
const map=L.map('map',{worldCopyJump:true}).setView([25,20],2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap, &copy; CARTO',subdomains:'abcd',maxZoom:18}).addTo(map);
const cluster=L.markerClusterGroup({chunkedLoading:true,maxClusterRadius:45});
fetch('/locations').then(r=>r.json()).then(d=>{
  $('#mapcount').textContent=(d.count||0).toLocaleString()+' geolocated sites';
  (d.points||[]).forEach(p=>{
    const m=L.circleMarker([p.lat,p.lon],{radius:5,color:'#0E7C66',weight:1.5,fillColor:'#0E7C66',fillOpacity:.6});
    const head=`<b>${esc(p.name||'Site')}</b><br>${esc(p.city||'')}${p.country?', '+esc(p.country):''}`;
    m.bindPopup(head+'<hr style="margin:7px 0;border:none;border-top:1px solid #E6DFD4"><div class="sp">loading trials…</div>',{maxWidth:280,minWidth:220});
    m.on('popupopen',()=>{
      fetch('/site?name='+encodeURIComponent(p.name||'')+'&city='+encodeURIComponent(p.city||''))
       .then(r=>r.json()).then(s=>{
         const items=(s.trials||[]).map(x=>`<div style="margin:7px 0"><a href="${esc(x.url)}" target="_blank" rel="noopener" style="font-weight:600">${esc(x.title||x.nct_id)}</a><br><span style="font-family:'Space Mono';font-size:.72rem;color:#6B7680">${esc(x.condition||'')} · ${esc(x.status||'')}</span></div>`).join('');
         const body=items?`<div style="font-family:'Space Mono';font-size:.7rem;letter-spacing:.08em;color:#6B7680;margin-bottom:2px">${s.count} RECRUITING TRIAL${s.count>1?'S':''}</div><div style="max-height:180px;overflow:auto">${items}</div>`:'<span style="color:#6B7680">No trial detail for this site.</span>';
         m.setPopupContent(head+'<hr style="margin:7px 0;border:none;border-top:1px solid #E6DFD4">'+body);
       }).catch(()=>{m.setPopupContent(head+'<br><span style="color:#6B7680">Could not load trials.</span>');});
    });
    cluster.addLayer(m);
  });
  map.addLayer(cluster);
}).catch(()=>{$('#mapcount').textContent='map unavailable';});

// metrics
fetch('/stats').then(r=>r.json()).then(d=>{
  $('#s-total').textContent=(d.total||0).toLocaleString();
  $('#s-sources').textContent=d.n_sources||0;
  $('#s-countries').textContent=d.n_countries||0;
  $('#srclist').textContent=(d.sources||[]).length;
  const smax=Math.max(1,...(d.sources||[]).map(s=>s.count));
  $('#c-sources').innerHTML=(d.sources||[]).map(s=>`<div class="row srcrow"><div class="lab"><span class="name"><i class="dot" style="background:${SRC_COLOR[s.name]||'#0E7C66'}"></i>${esc(s.name)}</span><b>${s.count.toLocaleString()}</b></div><div class="track"><div class="f" style="background:${SRC_COLOR[s.name]||'#0E7C66'}" data-w="${Math.round(s.count/smax*100)}"></div></div></div>`).join('');
  bars('#c-countries',d.top_countries,'#C77D2E');
  bars('#c-conditions',d.top_conditions,'#6D4AA6');
  animate();
});
function bars(sel,items,color){
  items=items||[];const max=Math.max(1,...items.map(i=>i.count));
  $(sel).innerHTML=items.slice(0,8).map(i=>`<div class="row"><div class="lab"><span>${esc(i.name)}</span><b>${i.count}</b></div><div class="track"><div class="f" style="background:${color}" data-w="${Math.round(i.count/max*100)}"></div></div></div>`).join('');
}
function animate(){setTimeout(()=>document.querySelectorAll('.f').forEach(f=>f.style.width=f.dataset.w+'%'),80);}

// stat: located sites count comes from /locations too
fetch('/locations').then(r=>r.json()).then(d=>{$('#s-sites').textContent=(d.count||0).toLocaleString();});
</script>
</body>
</html>
